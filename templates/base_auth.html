{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}YTClone{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
</head>
<body class="yt-auth-body">

<div class="yt-auth-topbar">
  <a href="{% url 'home' %}" class="yt-auth-topbar-logo" aria-label="{% trans 'YTClone home' %}">
    <svg viewBox="0 0 90 20" fill="none" xmlns="http://www.w3.org/2000/svg" height="18">
      <path d="M27.9 3.5c-.3-1.2-1.3-2.1-2.5-2.4C23.2.5 14.5.5 14.5.5S5.8.5 3.6 1.1C2.3 1.4 1.3 2.3 1 3.5.4 5.7.4 10 .4 10s0 4.3.6 6.5c.3 1.2 1.3 2.1 2.5 2.4 2.2.6 10.9.6 10.9.6s8.7 0 10.9-.6c1.2-.3 2.1-1.2 2.5-2.4.6-2.2.6-6.5.6-6.5s0-4.3-.5-6.5z" fill="#FF0000"/>
      <path d="M11.8 13.9V6.1l7.3 3.9-7.3 3.9z" fill="white"/>
      <text x="32" y="15" font-family="Roboto" font-size="14" font-weight="700" fill="#0f0f0f">YTClone</text>
    </svg>
  </a>
  {% include "partials/language_dropdown.html" with btn_class="yt-icon-btn" icon_size="fs-5" %}
</div>

{% if messages %}
<div class="yt-auth-messages">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2" role="alert" style="font-size:14px;">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
