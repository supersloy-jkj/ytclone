{% extends 'base_auth.html' %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} - YTClone{% endblock %}

{% block content %}
<div class="yt-auth-simple-screen">
  <div class="yt-auth-simple-card yt-text-center">
    <div class="yt-auth-simple-icon yt-auth-simple-icon-success"><i class="bi bi-check-circle"></i></div>
    <h1 class="yt-auth-heading">{% trans "Password changed" %}</h1>
    <p class="yt-auth-subheading">{% trans "Your password has been updated. You can now sign in with your new password." %}</p>
    <a href="{% url 'login' %}" class="yt-auth-submit yt-auth-submit-link">{% trans "Sign in" %}</a>
  </div>
</div>
{% endblock %}
