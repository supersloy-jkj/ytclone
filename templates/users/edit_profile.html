{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Edit profile" %} - YTClone{% endblock %}

{% block content %}
<div style="max-width:600px;margin:0 auto;padding:32px 24px;">
  <h1 style="font-size:22px;font-weight:600;margin-bottom:24px;">{% trans "Edit profile" %}</h1>
  <div style="border:1px solid #e5e5e5;border-radius:12px;padding:32px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="margin-bottom:20px;">
        <label>{% trans "Username" %}</label>
        <input type="text" name="username" class="yt-form-control" value="{{ form.username.value }}" required>
      </div>
      <div style="margin-bottom:20px;">
        <label>{% trans "Email" %}</label>
        <input type="email" name="email" class="yt-form-control" value="{{ form.email.value }}">
      </div>
      <div style="margin-bottom:20px;">
        <label>{% trans "Bio" %}</label>
        <textarea name="bio" class="yt-form-control" rows="3"
                  placeholder="{% trans 'Tell viewers about your channel' %}">{{ form.bio.value|default:"" }}</textarea>
      </div>
      <div style="margin-bottom:20px;">
        <label>{% trans "Profile picture" %}</label>
        {% if user.avatar %}
          <div style="margin-bottom:8px;">
            <img src="{{ user.avatar.url }}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">
          </div>
        {% endif %}
        <input type="file" name="avatar" accept="image/*" class="yt-form-control" style="padding:8px;">
      </div>
      <div style="margin-bottom:24px;">
        <label>{% trans "Channel banner" %}</label>
        <input type="file" name="banner" accept="image/*" class="yt-form-control" style="padding:8px;">
        <div style="font-size:12px;color:#606060;margin-top:4px;">
          {% trans "Recommended size: 2560 × 1440 px." %}
        </div>
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" style="background:#065fd4;color:#fff;border:none;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;">
          {% trans "Save" %}
        </button>
        <a href="{% url 'channel' user.username %}" style="background:#f2f2f2;color:#0f0f0f;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;">
          {% trans "Cancel" %}
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
